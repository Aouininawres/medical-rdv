<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MediPlan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-center">
                <i class="fas fa-stethoscope"></i>
                <span>MediPlan</span>
            </div>
            
            <h1>Connexion</h1>
            <p>Accédez à votre espace médical</p>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required placeholder="doctor@test.com">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span class="checkmark"></span>
                        Se souvenir de moi
                    </label>
                    <a href="motdepasse.html" class="forgot-link">Mot de passe oublié ?</a>
                </div>
                
                <button type="submit" class="btn-primary-full">
                    <i class="fas fa-sign-in-alt"></i>
                    Se connecter
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Pas de compte ? <a href="register.html">S'inscrire</a></p>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Redirection temporaire - sera remplacé par PHP plus tard
            window.location.href = 'doctor-dashboard.html';
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
